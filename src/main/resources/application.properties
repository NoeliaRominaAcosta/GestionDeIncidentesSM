# ===================================================================
# Configuración del Servidor y Thymeleaf
# ===================================================================
server.port=8080
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===================================================================
# Configuración de Base de Datos H2 (Persistida en archivo local)
# ===================================================================
spring.datasource.url=jdbc:h2:file:./data/oncalldb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=true

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Inicialización de Datos: ejecutar data.sql después de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===================================================================
# Logging
# ===================================================================
logging.level.root=INFO
logging.level.com.oncall.engine=DEBUG
logging.level.org.springframework.statemachine=DEBUG
logging.level.org.springframework.security=INFO
