<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - On-Call Engine</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span>On-Call</span> Engine
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group" style="text-align: left;">
                    <label class="form-label" for="username">Usuario</label>
                    <input class="form-control" type="text" id="username" name="username" placeholder="Ingresa tu usuario" required autofocus>
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label class="form-label" for="password">Contraseña</label>
                    <input class="form-control" type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
                
                <div th:if="${param.error}" class="alert-exhausted" style="padding: 0.5rem 1rem; font-size: 0.85rem; margin-bottom: 1rem; border-color: rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.08); animation: none;">
                    Usuario o contraseña incorrectos.
                </div>
                
                <div th:if="${param.logout}" class="alert-exhausted" style="padding: 0.5rem 1rem; font-size: 0.85rem; margin-bottom: 1rem; border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.08); color: #a7f3d0; animation: none;">
                    Sesión cerrada correctamente.
                </div>
                
                <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 1rem;">Ingresar</button>
            </form>
            
            <div class="demo-credentials">
                <strong>Credenciales de Prueba (v1):</strong>
                <table>
                    <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>Contraseña</th>
                            <th>Rol</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><code>romina</code></td>
                            <td>admin123</td>
                            <td>Administrador</td>
                        </tr>
                        <tr>
                            <td><code>juan</code></td>
                            <td>user123</td>
                            <td>Ingeniero On-Call (1°)</td>
                        </tr>
                        <tr>
                            <td><code>maria</code></td>
                            <td>user123</td>
                            <td>Ingeniero On-Call (2°)</td>
                        </tr>
                        <tr>
                            <td><code>lucas</code></td>
                            <td>user123</td>
                            <td>Ingeniero On-Call (3°)</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
